name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  # GitHub repository name in lowercase for Docker image paths
  OWNER_LC: ""

jobs:
  # 1. CI Stage: Install, Build and Verify typescript compile for each microservice
  ci-test:
    name: CI - Verify Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [
          apiGateway,
          identityService,
          userService,
          productCatlogService,
          inventoryService,
          cartService,
          OrderService,
          paymentService,
          NotificationService,
          frontend
        ]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './${{ matrix.service }}/package-lock.json'

      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Compile Code / Build
        run: |
          cd ${{ matrix.service }}
          # Run build script to ensure typescript compiles correctly without syntax errors
          npm run build --if-present

  # 2. CD Stage: Build Docker images and push them to GitHub Container Registry (GHCR)
  docker-build-push:
    name: CD - Build & Push Docker Images
    needs: ci-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: apiGateway
            image-name: api-gateway
          - service: identityService
            image-name: identity-service
          - service: userService
            image-name: user-service
          - service: productCatlogService
            image-name: product-service
          - service: inventoryService
            image-name: inventory-service
          - service: cartService
            image-name: cart-service
          - service: OrderService
            image-name: order-service
          - service: paymentService
            image-name: payment-service
          - service: NotificationService
            image-name: notification-service
          - service: frontend
            image-name: frontend
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert Repository Owner to Lowercase
        id: repo_owner
        run: |
          echo "owner_lowercase=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Extract Docker metadata (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner_lowercase }}/${{ matrix.image-name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. CD Deployment: Orchestration rollout notification / CD trigger
  rollout:
    name: CD - Deploy Rollout
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Summary
        run: |
          echo "###  CI/CD Release Successfully Orchestrated!" >> $GITHUB_STEP_SUMMARY
          echo "All Docker images built and pushed to GitHub Packages (GHCR.io) successfully." >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ghcr.io/${{ github.repository_owner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Strategy**: Pull latest containers and reload Docker Compose." >> $GITHUB_STEP_SUMMARY

version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: ecommerce_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ecommerce_network

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ecommerce_network

  api-gateway:
    build: ./apiGateway
    container_name: ecommerce_api_gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_ACCESS_SECRET=your_super_secret_jwt_access_key_123!
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IDENTITY_SERVICE_URL=http://identity-service:3002
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - INVENTORY_SERVICE_URL=http://inventory-service:3006
      - CART_SERVICE_URL=http://cart-service:3007
      - NOTIFICATION_SERVICE_URL=http://notification-service:3008
    depends_on:
      - redis
    networks:
      - ecommerce_network

  identity-service:
    build: ./identityService
    container_name: ecommerce_identity_service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_user_db
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - JWT_ACCESS_SECRET=your_super_secret_jwt_access_key_123!
      - JWT_REFRESH_SECRET=your_super_secret_jwt_refresh_key_456!
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - NODE_ENV=production
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce_network

  user-service:
    build: ./userService
    container_name: ecommerce_user_service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_user_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - JWT_ACCESS_SECRET=your_super_secret_jwt_access_key_123!
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - ecommerce_network

  product-service:
    build: ./productCatlogService
    container_name: ecommerce_product_service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_product_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis
    networks:
      - ecommerce_network

  inventory-service:
    build: ./inventoryService
    container_name: ecommerce_inventory_service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_inventory_db
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - NODE_ENV=production
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce_network

  cart-service:
    build: ./cartService
    container_name: ecommerce_cart_service
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - ecommerce_network

  order-service:
    build: ./OrderService
    container_name: ecommerce_order_service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_order_db
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - NODE_ENV=production
      - INVENTORY_SERVICE_URL=http://inventory-service:3006
      - CART_SERVICE_URL=http://cart-service:3007
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce_network

  payment-service:
    build: ./paymentService
    container_name: ecommerce_payment_service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce_payment_db
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - NODE_ENV=production
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce_network

  notification-service:
    build: ./NotificationService
    container_name: ecommerce_notification_service
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - NODE_ENV=production
    depends_on:
      - rabbitmq
    networks:
      - ecommerce_network

  frontend:
    build: ./frontend
    container_name: ecommerce_frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - ecommerce_network

volumes:
  mongo_data:

networks:
  ecommerce_network:
    driver: bridge
